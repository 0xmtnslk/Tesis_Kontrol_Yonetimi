version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: tesis_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tesis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: tesis_backend_prod
    restart: always
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - tesis_network
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: tesis_frontend_prod
    restart: always
    networks:
      - tesis_network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: tesis_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - uploads_data:/app/uploads:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - tesis_network
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:

networks:
  tesis_network:
    driver: bridge
